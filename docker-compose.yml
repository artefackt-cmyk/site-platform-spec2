services:
  postgres:
    image: postgres:16-alpine
    container_name: site-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-site_platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-site_platform_local_password}
      POSTGRES_DB: ${POSTGRES_DB:-site_platform_dev}
      POSTGRES_TEST_DB: ${POSTGRES_TEST_DB:-site_platform_test}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - site_platform_postgres_data:/var/lib/postgresql/data
      - ./infra/docker-compose/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  site_platform_postgres_data:

