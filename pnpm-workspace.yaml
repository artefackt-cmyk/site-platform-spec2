packages:
  - "apps/*"
  - "packages/*"

onlyBuiltDependencies:
  - "@prisma/client"
  - "@prisma/engines"
  - argon2
  - esbuild
  - prisma
  - sharp

allowBuilds:
  "@prisma/client": true
  "@prisma/engines": true
  argon2: true
  esbuild: true
  prisma: true
  sharp: true

confirmModulesPurge: false
